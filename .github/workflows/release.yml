name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: windows-latest, target: x86_64-pc-windows-msvc, suffix: .exe }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, suffix: "" }
          - { os: macos-latest, target: x86_64-apple-darwin, suffix: "" }
          - { os: macos-latest, target: aarch64-apple-darwin, suffix: "-arm" }

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: t-music-bot-rpc-${{ matrix.platform.target }}
          path: target/${{ matrix.platform.target }}/release/t-music-bot-rpc${{ matrix.platform.suffix }}
